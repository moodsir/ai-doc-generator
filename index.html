<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>AI文档Skill演示</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h2 { color: #333; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        select, button { padding: 10px 20px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        button { background: #007bff; color: white; border: none; }
        button:hover { background: #0056b3; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; }
        .label { font-weight: bold; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <h2>🤖 AI项目文档生成演示</h2>
    
    <span class="label">输入功能描述/项目内容：</span>
    <textarea id="content" rows="6" placeholder="输入项目功能描述，如：用户登录注册、商品管理、订单处理、数据分析等功能..."></textarea>
    
    <br><br>
    
    <span class="label">文档类型：</span>
    <select id="doc_type">
        <option value="readme">README（项目说明）</option>
        <option value="changelog">Changelog（更新日志）</option>
        <option value="release_note">Release Notes（发布说明）</option>
    </select>
    
    <span class="label">语言：</span>
    <select id="lang">
        <option value="zh">中文</option>
        <option value="en">English</option>
    </select>
    
    <button onclick="generate()">🚀 生成文档</button>
    
    <br><br>
    
    <span class="label">返回结果：</span>
    <pre id="result" style="background:#f5f5f5;padding:15px;display:none;"></pre>

    <script>
        async function generate() {
            const resultEl = document.getElementById("result");
            resultEl.style.display = "block";
            resultEl.innerText = "正在生成...";
            
            try {
                const res = await fetch("/api/generate-doc", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        api_key: "free_tier_key",
                        content: document.getElementById("content").value,
                        doc_type: document.getElementById("doc_type").value,
                        lang: document.getElementById("lang").value
                    })
                });
                
                const data = await res.json();
                resultEl.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                resultEl.innerText = "请求失败: " + err.message;
            }
        }
    </script>
</body>
</html>
